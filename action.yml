name: 'Auto Changelog'
description: 'AI-powered changelog generator using the GitHub Models API. Analyzes PR diffs and updates CHANGELOG.md files with Keep a Changelog-formatted entries.'
author: 'vensas'

branding:
  icon: 'file-text'
  color: 'blue'

inputs:
  ai-api-key:
    description: 'GitHub Models API key (a PAT with models:read permission, or a GitHub Copilot token)'
    required: true
  github-token:
    description: 'GitHub token used to fetch linked issue details and post a PR comment. If omitted, no PR comment is posted.'
    required: false
  pr-number:
    description: 'Pull request number'
    required: true
  pr-title:
    description: 'Pull request title'
    required: true
  pr-body:
    description: 'Pull request body/description (used to extract closing-keyword issue references)'
    required: false
    default: ''
  base-ref:
    description: 'Base branch name (e.g. main)'
    required: true
  packages:
    description: |
      JSON array of package configurations. Each entry must include:
        - name:          Short identifier for the package (e.g. "frontend")
        - path:          Relative path to the package root (e.g. "src/frontend")
        - changelogFile: Changelog filename inside that path (usually "CHANGELOG.md")
        - description:   One-line description used as context for the AI
        - patterns:      Array of regex patterns matching files that belong to this package
      Example:
        '[{"name":"api","path":"src/api","changelogFile":"CHANGELOG.md","description":"Node.js REST API","patterns":["^src/api/"]}]'
    required: true
  project-context:
    description: 'Short description of your project, included in the AI prompt for more accurate entries'
    required: false
    default: ''
  model:
    description: 'GitHub Models model identifier to use for generation'
    required: false
    default: 'gpt-4.1'
  github-models-api:
    description: 'GitHub Models API endpoint URL'
    required: false
    default: 'https://models.github.ai/inference/chat/completions'
  max-diff-chars:
    description: 'Maximum number of characters from the per-package diff to send to the AI'
    required: false
    default: '8000'
  dry-run:
    description: 'When "true", generates entries and prints them to the workflow summary without modifying any CHANGELOG.md files'
    required: false
    default: 'false'
  branch-ref:
    description: 'Branch name to commit and push changelog changes back to (e.g. github.event.pull_request.head.ref). If empty, files are updated but no commit is made.'
    required: false
    default: ''
  commit-message:
    description: 'Commit message used when pushing generated changelog entries'
    required: false
    default: 'chore: update changelogs with AI-generated entries'

outputs:
  has-changes:
    description: '"true" if any CHANGELOG.md files were updated, "false" otherwise'
    value: ${{ steps.generate.outputs.has_changes }}
  updates:
    description: 'Comma-separated list of packages updated with their version bump type (e.g. "frontend: minor, api: patch")'
    value: ${{ steps.generate.outputs.updates }}
  error-message:
    description: 'Error message if changelog generation failed'
    value: ${{ steps.generate.outputs.error_message }}
  generated-entry:
    description: 'Raw markdown text of the generated changelog entries (set even in dry-run mode)'
    value: ${{ steps.generate.outputs.generated_entry }}
  skipped:
    description: '"true" if the action was skipped due to bot-loop detection'
    value: ${{ steps.guard.outputs.skip }}
  committed:
    description: '"true" if a changelog commit was pushed to the branch'
    value: ${{ steps.commit.outputs.committed }}
  cleared:
    description: '"true" if the [Unreleased] sections were cleared because no source-file changes were detected'
    value: ${{ steps.generate.outputs.cleared }}

runs:
  using: 'composite'
  steps:
    - name: Detect bot loop
      id: guard
      shell: bash
      run: |
        last_author=$(git log -1 --pretty=format:'%an')
        if [ "$last_author" = "github-actions[bot]" ]; then
          echo "Last commit was from the bot — skipping to prevent loop"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        if git show --name-only --format="" HEAD | grep -qE "CHANGELOG\.md$"; then
          echo "Last commit touched CHANGELOG.md — skipping to avoid overwriting manual changes"
          echo "skip=true" >> $GITHUB_OUTPUT
          exit 0
        fi
        echo "skip=false" >> $GITHUB_OUTPUT

    - name: Setup Node.js
      if: steps.guard.outputs.skip != 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Generate changelog entries
      id: generate
      if: steps.guard.outputs.skip != 'true'
      shell: bash
      env:
        AI_API_KEY: ${{ inputs.ai-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ inputs.pr-number }}
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        BASE_REF: ${{ inputs.base-ref }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        PACKAGES_CONFIG: ${{ inputs.packages }}
        PROJECT_CONTEXT: ${{ inputs.project-context }}
        AI_MODEL: ${{ inputs.model }}
        GITHUB_MODELS_API_URL: ${{ inputs.github-models-api }}
        MAX_DIFF_CHARS: ${{ inputs.max-diff-chars }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: node ${{ github.action_path }}/generate-changelog.js

    - name: Commit and push changelog
      id: commit
      if: steps.guard.outputs.skip != 'true' && inputs.branch-ref != '' && steps.generate.outputs.has_changes == 'true'
      shell: bash
      env:
        BRANCH_REF: ${{ inputs.branch-ref }}
        COMMIT_MSG: ${{ inputs.commit-message }}
        UPDATES: ${{ steps.generate.outputs.updates }}
        IS_CLEARED: ${{ steps.generate.outputs.cleared }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add '**/CHANGELOG.md'
        if git diff --staged --quiet; then
          echo "No changelog changes to commit"
          echo "committed=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        if [ "$IS_CLEARED" = "true" ]; then
          FULL_MSG="chore: clear changelogs due to code changes being reverted"
        else
          FULL_MSG="${COMMIT_MSG}"$'\n\n'"${UPDATES}"$'\n\nGenerated by auto-changelog-action'
        fi
        git commit -m "$FULL_MSG"
        git push origin "$BRANCH_REF"
        echo "committed=true" >> $GITHUB_OUTPUT

    - name: Post PR comment
      if: inputs.github-token != '' && (steps.generate.outputs.generated_entry != '' || steps.generate.outputs.cleared == 'true')
      uses: actions/github-script@v7
      env:
        GENERATED_ENTRY: ${{ steps.generate.outputs.generated_entry }}
        UPDATES: ${{ steps.generate.outputs.updates }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        IS_CLEARED: ${{ steps.generate.outputs.cleared }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const entry = process.env.GENERATED_ENTRY;
          const isDryRun = process.env.INPUT_DRY_RUN === 'true';
          const isCleared = process.env.IS_CLEARED === 'true';
          const updates = process.env.UPDATES;

          let body;
          if (isCleared) {
            body = `🧹 **Changelogs cleared**\n\nCode changes were reverted, so changelog entries have been removed from the \`[Unreleased]\` section.\n\n*This was done automatically by the changelog bot.*`;
          } else if (isDryRun) {
            body = `📋 **Changelog preview** *(dry run — no files were modified)*\n\n\`\`\`markdown\n${entry}\n\`\`\``;
          } else {
            body = `✅ **Changelog updated!**\n\nUpdated: ${updates}\n\n\`\`\`markdown\n${entry}\n\`\`\`\n\n*Generated using GitHub Models AI. Review and adjust if needed.*`;
          }

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: parseInt(process.env.INPUT_PR_NUMBER),
            body
          });

    - name: Post error comment
      if: failure() && inputs.github-token != '' && steps.guard.outputs.skip != 'true'
      uses: actions/github-script@v7
      env:
        ERROR_MSG: ${{ steps.generate.outputs.error_message }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const msg = process.env.ERROR_MSG || 'Check the workflow logs for details.';
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: parseInt(process.env.INPUT_PR_NUMBER),
            body: `⚠️ **Changelog generation failed**\n\n${msg}\n\nYou may need to update the changelogs manually.`
          });
